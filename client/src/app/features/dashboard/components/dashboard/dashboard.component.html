<div class="dashboard-container">
  <div class="header-dash">
    <h1>Dashboard</h1>
    <p class="text-secondary">Acompanhe o resumo das atividades de treinamento.</p>
  </div>

  <div class="kpi-grid">
    <div class="card kpi-card">
      <div class="kpi-icon icon-purple">📚</div>
      <div class="kpi-info">
        <span class="kpi-label">Total de Workshops</span>
        <span class="kpi-value">{{ totalWorkshops }}</span>
      </div>
    </div>

    <div class="card kpi-card">
      <div class="kpi-icon icon-blue">👥</div>
      <div class="kpi-info">
        <span class="kpi-label">Colaboradores</span>
        <span class="kpi-value">{{ totalColaboradores }}</span>
      </div>
    </div>

    <div class="card kpi-card">
      <div class="kpi-icon icon-green">📝</div>
      <div class="kpi-info">
        <span class="kpi-label">Atas Realizadas</span>
        <span class="kpi-value">{{ totalAtas }}</span>
      </div>
    </div>
  </div>

  <div class="card welcome-card">
    <div class="welcome-text">
      <h2>Bem-vindo de volta, Gabriel!</h2>
      <p>O sistema Workshop Tracker está pronto para novos registros.</p>
    </div>
  </div>
</div>
