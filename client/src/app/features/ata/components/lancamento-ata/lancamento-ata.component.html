<div class="card-lancamento">
  <h2>Lançar Ata de Presença</h2>
  <p>Selecione o workshop e marque os colaboradores que compareceram.</p>

  <div class="form-group">
    <label for="workshopSelect">1. Selecione o Workshop</label>
    <select 
      id="workshopSelect" 
      class="form-control" 
      [(ngModel)]="workshopSelecionadoId">
      <option [value]="0">--- Escolha um evento ---</option>
      <option *ngFor="let w of workshops" [value]="w.id">
        {{ w.nome }} - {{ w.dataRealizacao | date:'dd/MM/yyyy' }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <div class="label-row">
      <label>2. Marque os presentes</label>
    </div>

    <div class="lista-colaboradores">
      <div *ngFor="let c of colaboradores" class="colaborador-item">
        <input 
          type="checkbox" 
          [id]="'colab-' + c.id"
          (change)="toggleColaborador(c.id)">
        
        <label [for]="'colab-' + c.id" class="colaborador-info">
          <span class="nome-colab">{{ c.nome }}</span>
          <span class="cargo-colab">ID: {{ c.id }}</span>
        </label>
      </div>

      <p *ngIf="colaboradores.length === 0" class="aviso">
        Nenhum colaborador encontrado. Cadastre-os via API/Swagger primeiro.
      </p>
    </div>
  </div>

  <div class="actions">
    <button class="btn-clear" (click)="colaboradoresSelecionados = []">Limpar Seleção</button>
    <button 
      class="btn-save" 
      [disabled]="workshopSelecionadoId === 0 || colaboradoresSelecionados.length === 0"
      (click)="finalizarLancamento()">
      ✓ Finalizar Lançamento
    </button>
  </div>
</div>
